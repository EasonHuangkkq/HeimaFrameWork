# Heima Robot Control Configuration
# PD Controller Gains, Default Joint Angles, and Action Scales

# PD Controller Gains (stiffness = kp, damping = kd)
# Order: Left leg [hip_roll, hip_yaw, hip_pitch, knee, ankle_pitch, ankle_roll]
#        Right leg [hip_roll, hip_yaw, hip_pitch, knee, ankle_pitch, ankle_roll]
#        Waist [3 motors]
pd_gains:
  kp:  # Stiffness (N·m/rad)
    - 40.179  # Left: hip_roll
    - 40.179  # Left: hip_yaw
    - 99.098  # Left: hip_pitch
    - 40.179  # Left: knee
    - 16.778  # Left: ankle_pitch
    - 16.778  # Left: ankle_roll
    - 40.179  # Right: hip_roll
    - 40.179  # Right: hip_yaw
    - 99.098  # Right: hip_pitch
    - 40.179  # Right: knee
    - 16.778  # Right: ankle_pitch
    - 16.778  # Right: ankle_roll
    - 200.0   # Waist motor 1
    - 200.0   # Waist motor 2
    - 200.0   # Waist motor 3
  kd:  # Damping (N·m·s/rad)
    - 2.558   # Left: hip_roll
    - 2.558   # Left: hip_yaw
    - 6.309   # Left: hip_pitch
    - 2.558   # Left: knee
    - 1.068   # Left: ankle_pitch
    - 1.068   # Left: ankle_roll
    - 2.558   # Right: hip_roll
    - 2.558   # Right: hip_yaw
    - 6.309   # Right: hip_pitch
    - 2.558   # Right: knee
    - 1.068   # Right: ankle_pitch
    - 1.068   # Right: ankle_roll
    - 1.0     # Waist motor 1
    - 1.0     # Waist motor 2
    - 1.0     # Waist motor 3

# Default joint angles (radians) when action = 0.0
# Order: Left leg [hip_roll, hip_yaw, hip_pitch, knee, ankle_pitch, ankle_roll]
#        Right leg [hip_roll, hip_yaw, hip_pitch, knee, ankle_pitch, ankle_roll]
#        Waist [3 motors]
default_joint_angles:
  - 0.0      # Left: hip_roll
  - 0.0      # Left: hip_yaw
  - 0.25    # Left: hip_pitch
  - -0.5     # Left: knee
  - 0.25     # Left: ankle_pitch
  - 0.0      # Left: ankle_roll
  - 0.0      # Right: hip_roll
  - 0.0      # Right: hip_yaw
  - 0.25    # Right: hip_pitch
  - -0.5     # Right: knee
  - 0.25     # Right: ankle_pitch
  - 0.0      # Right: ankle_roll
  - 0.0      # Waist motor 1
  - 0.0      # Waist motor 2
  - 0.0      # Waist motor 3

# Action scales (per-joint scales for neural network actions)
# Order: Same as default_joint_angles
# Action is applied as: target_angle = default_angle + action * action_scale
action_scale:
  - 1.9910780472403882  # Left: hip_roll
  - 1.9910780472403882  # Left: hip_yaw
  - 1.1352349630969132  # Left: hip_pitch
  - 1.9910780472403882  # Left: knee
  - 0.8940104439540857  # Left: ankle_pitch
  - 0.8940104439540857  # Left: ankle_roll
  - 1.9910780472403882  # Right: hip_roll
  - 1.9910780472403882  # Right: hip_yaw
  - 1.1352349630969132  # Right: hip_pitch
  - 1.9910780472403882  # Right: knee
  - 0.8940104439540857  # Right: ankle_pitch
  - 0.8940104439540857  # Right: ankle_roll
  - 1.0                  # Waist motor 1
  - 1.0                  # Waist motor 2
  - 1.0                  # Waist motor 3

# Observation scaling factors (for neural network input normalization)
# These scales are applied to observations before feeding to the neural network
observation_scales:
  lin_vel_scale: 2.0      # Linear velocity scale (m/s)
  ang_vel_scale: 0.25     # Angular velocity scale (rad/s)
  dof_pos_scale: 1.0      # Joint position scale (rad)
  dof_vel_scale: 0.05     # Joint velocity scale (rad/s)
  cmd_scale:              # Command scale [vx, vy, wz]
    - 2.0                 # vx (forward/backward)
    - 2.0                 # vy (left/right)
    - 0.25                # wz (yaw rate)

