# Heima Robot Control Configuration
# PD Controller Gains, Default Joint Angles, and Action Scales
# Extracted from ONNX model metadata

# PD Controller Gains (stiffness = kp, damping = kd)
# Order: Left leg [hip_roll, hip_yaw, hip_pitch, knee, ankle_pitch, ankle_roll]
#        Right leg [hip_roll, hip_yaw, hip_pitch, knee, ankle_pitch, ankle_roll]
#        Waist [3 motors]
pd_gains:
  kp:  # Stiffness (N·m/rad)
    - 30.0  # Left: hip_roll
    - 30.0  # Left: hip_yaw
    - 40.0  # Left: hip_pitch
    - 30.0  # Left: knee
    - 20.96  # Left: ankle_pitch
    - 0.0  # Left: ankle_roll
    - 30.0  # Right: hip_roll
    - 30.0  # Right: hip_yaw
    - 40.0  # Right: hip_pitch
    - 30.0  # Right: knee
    - 20.96  # Right: ankle_pitch
    - 0.0  # Right: ankle_roll
    - 200.0  # Waist motor 1
    - 200.0  # Waist motor 2
    - 200.0  # Waist motor 3
  kd:  # Damping (N·m·s/rad)
    - 3.0  # Left: hip_roll
    - 3.0  # Left: hip_yaw
    - 4.0  # Left: hip_pitch
    - 3.0  # Left: knee
    - 1.436  # Left: ankle_pitch
    - 0.1  # Left: ankle_roll
    - 3.0  # Right: hip_roll
    - 3.0  # Right: hip_yaw
    - 4.0  # Right: hip_pitch
    - 3.0  # Right: knee
    - 1.436  # Right: ankle_pitch
    - 0.1  # Right: ankle_roll
    - 1.0  # Waist motor 1
    - 1.0  # Waist motor 2
    - 1.0  # Waist motor 3

# Default joint angles (radians) when action = 0.0
# Order: Left leg [hip_roll, hip_yaw, hip_pitch, knee, ankle_pitch, ankle_roll]
#        Right leg [hip_roll, hip_yaw, hip_pitch, knee, ankle_pitch, ankle_roll]
#        Waist [3 motors]
default_joint_angles:
  - 0.0  # Left: hip_roll
  - 0.0  # Left: hip_yaw
  - 0.4  # Left: hip_pitch
  - -0.8  # Left: knee
  - 0.4  # Left: ankle_pitch
  - 0.0  # Left: ankle_roll
  - 0.0  # Right: hip_roll
  - 0.0  # Right: hip_yaw
  - 0.4  # Right: hip_pitch
  - -0.8  # Right: knee
  - 0.4  # Right: ankle_pitch
  - 0.0  # Right: ankle_roll
  - 0.0  # Waist motor 1
  - 0.0  # Waist motor 2
  - 0.0  # Waist motor 3

# Action scales (per-joint scales for neural network actions)
# Order: Same as default_joint_angles
# Action is applied as: target_angle = default_angle + action * action_scale
action_scale:
  - 2.267  # Left: hip_roll
  - 2.267  # Left: hip_yaw
  - 2.391  # Left: hip_pitch
  - 2.267  # Left: knee
  - 0.5  # Left: ankle_pitch
  - 0.5  # Left: ankle_roll
  - 2.267  # Right: hip_roll
  - 2.267  # Right: hip_yaw
  - 2.391  # Right: hip_pitch
  - 2.267  # Right: knee
  - 0.5  # Right: ankle_pitch
  - 0.5  # Right: ankle_roll
  - 1.0  # Waist motor 1
  - 1.0  # Waist motor 2
  - 1.0  # Waist motor 3

safety:
  action_clip: 1.0
  target_pos_min: -2.0
  target_pos_max: 2.0
  pvt_max_vel: 10.0

# Observation scaling factors (for neural network input normalization)
# These scales are applied to observations before feeding to the neural network
observation_scales:
  lin_vel_scale: 2.0      # Linear velocity scale (m/s)
  ang_vel_scale: 0.25    # Angular velocity scale (rad/s)
  dof_pos_scale: 1.0     # Joint position scale (rad)
  dof_vel_scale: 0.05    # Joint velocity scale (rad/s)
  cmd_scale:              # Command scale [vx, vy, wz]
    - 2.0                 # vx (forward/backward)
    - 2.0                 # vy (left/right)
    - 0.25                # wz (yaw rate)
