# Heima Robot Control Configuration
# PD Controller Gains, Default Joint Angles, and Action Scales
# Extracted from ONNX model metadata

# PD Controller Gains (stiffness = kp, damping = kd)
# Order: Left leg [hip_roll, hip_yaw, hip_pitch, knee, ankle_pitch, ankle_roll]
#        Right leg [hip_roll, hip_yaw, hip_pitch, knee, ankle_pitch, ankle_roll]
#        Waist [3 motors]
pd_gains:
  kp:  # Stiffness (N·m/rad)
    - 40.0  # Left: hip_roll
    - 40.0  # Left: hip_yaw
    - 75.0  # Left: hip_pitch
    - 40.0  # Left: knee
    - 12.0  # Left: ankle_pitch
    - 12.0  # Left: ankle_roll
    - 40.0  # Right: hip_roll
    - 40.0  # Right: hip_yaw
    - 75.0  # Right: hip_pitch
    - 40.0  # Right: knee
    - 12.0  # Right: ankle_pitch
    - 12.0  # Right: ankle_roll
    - 200.0  # Waist motor 1
    - 200.0  # Waist motor 2
    - 200.0  # Waist motor 3
  kd:  # Damping (N·m·s/rad)
    - 2.8  # Left: hip_roll
    - 2.8  # Left: hip_yaw
    - 5.3  # Left: hip_pitch
    - 2.8  # Left: knee
    - 0.6  # Left: ankle_pitch
    - 0.6  # Left: ankle_roll
    - 2.8  # Right: hip_roll
    - 2.8  # Right: hip_yaw
    - 5.3  # Right: hip_pitch
    - 2.8  # Right: knee
    - 0.6  # Right: ankle_pitch
    - 0.6  # Right: ankle_roll
    - 1.0  # Waist motor 1
    - 1.0  # Waist motor 2
    - 1.0  # Waist motor 3

# Default joint angles (radians) when action = 0.0
# Order: Left leg [hip_roll, hip_yaw, hip_pitch, knee, ankle_pitch, ankle_roll]
#        Right leg [hip_roll, hip_yaw, hip_pitch, knee, ankle_pitch, ankle_roll]
#        Waist [3 motors]
default_joint_angles:
  - 0.0  # Left: hip_roll
  - 0.0  # Left: hip_yaw
  - 0.4  # Left: hip_pitch
  - -0.8  # Left: knee
  - 0.2  # Left: ankle_pitch
  - 0.2  # Left: ankle_roll
  - 0.0  # Right: hip_roll
  - 0.0  # Right: hip_yaw
  - 0.4  # Right: hip_pitch
  - -0.8  # Right: knee
  - 0.2  # Right: ankle_pitch
  - 0.2  # Right: ankle_roll
  - 0.0  # Waist motor 1
  - 0.0  # Waist motor 2
  - 0.0  # Waist motor 3

# Action scales (per-joint scales for neural network actions)
# Order: Same as default_joint_angles
# Action is applied as: target_angle = default_angle + action * action_scale
action_scale:
  - 0.75  # Left: hip_roll
  - 0.75  # Left: hip_yaw
  - 0.433  # Left: hip_pitch
  - 0.75  # Left: knee
  - 0.521  # Left: ankle_pitch
  - 0.521  # Left: ankle_roll
  - 0.75  # Right: hip_roll
  - 0.75  # Right: hip_yaw
  - 0.433  # Right: hip_pitch
  - 0.75  # Right: knee
  - 0.521  # Right: ankle_pitch
  - 0.521  # Right: ankle_roll
  - 1.0  # Waist motor 1
  - 1.0  # Waist motor 2
  - 1.0  # Waist motor 3

safety:
  action_clip: 1.0
  target_pos_min: 
    - -0.14   # 右腿 hip_roll (hardware: ±0.18, 保守20%)
    - -0.32   # 右腿 hip_yaw (hardware: ±0.40)
    - -0.80   # 右腿 hip_pitch (hardware: -1.0~1.2)
    - -1.20   # 右腿 knee (hardware: -1.5~0.05)
    - -0.25   # 右腿 ankle_pitch (hardware: -0.45~0.62)
    - -0.25   # 右腿 ankle_roll (hardware: -0.57~0.69)
    - -0.14   # 左腿 hip_roll
    - -0.32   # 左腿 hip_yaw
    - -0.80   # 左腿 hip_pitch
    - -1.20   # 左腿 knee
    - -0.3   # 左腿 ankle_pitch
    - -0.3    # 左腿 ankle_roll
    - -5.0    # 腰部 1 (hardware: ±6.28)
    - -5.0    # 腰部 2
    - -5.0    # 腰部 3
  target_pos_max: 
    - 0.14
    - 0.32
    - 0.96
    - 0.04
    - 0.25
    - 0.25
    - 0.14
    - 0.32
    - 0.96
    - 0.04
    - 0.3
    - 0.3
    - 5.0
    - 5.0
    - 5.0
  pvt_max_vel: 10.0

# Observation scaling factors (for neural network input normalization)
# These scales are applied to observations before feeding to the neural network
observation_scales:
  lin_vel_scale: 1.0      # Linear velocity scale (m/s)
  ang_vel_scale: 1.0    # Angular velocity scale (rad/s)
  dof_pos_scale: 1.0     # Joint position scale (rad)
  dof_vel_scale: 1.0    # Joint velocity scale (rad/s)
  cmd_scale:              # Command scale [vx, vy, wz]
    - 1.0                 # vx (forward/backward)
    - 1.0                 # vy (left/right)
    - 1.0                # wz (yaw rate)
