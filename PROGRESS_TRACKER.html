        // Load from localStorage
        function loadProgress() {
            const saved = localStorage.getItem('heimaFrameWorkProgress');
            if (saved) {
                const data = JSON.parse(saved);
                // Merge saved task states
                data.modules.forEach(savedModule => {
                    const module = projectData.modules.find(m => m.id === savedModule.id);
                    if (module) {
                        module.expanded = savedModule.expanded;
                        savedModule.tasks.forEach(savedTask => {
                            const task = module.tasks.find(t => t.id === savedTask.id);
                            if (task) {
                                task.done = savedTask.done;
                                if (savedTask.subtasks) {
                                    task.subtasks.forEach(savedSubtask => {
                                        const subtask = task.subtasks.find(st => st.id === savedSubtask.id);
                                        if (subtask) {
                                            subtask.done = savedSubtask.done;
                                        }
                                    });
                                }
                            }
                        });
                    }
                });
                data.roadmap.forEach(savedPhase => {
                    const phase = projectData.roadmap.find(p => p.phase === savedPhase.phase);
                    if (phase) {
                        phase.items.forEach(savedItem => {
                            const item = phase.items.find(i => i.id === savedItem.id);
                            if (item) {
                                item.done = savedItem.done;
                            }
                        });
                    }
                });
                const lastSaved = localStorage.getItem('heimaFrameWorkLastUpdate');
                if (lastSaved) {
                    document.getElementById('lastUpdate').textContent = '最后更新: ' + new Date(lastSaved).toLocaleString('zh-CN');
                }
            }
            render();
        }

        // Save to localStorage
        function saveProgress() {
            const dataToSave = {
                modules: projectData.modules.map(m => ({
                    id: m.id,
                    expanded: m.expanded,
                    tasks: m.tasks
                })),
                roadmap: projectData.roadmap.map(p => ({ phase: p.phase, items: p.items }))
            };
            localStorage.setItem('heimaFrameWorkProgress', JSON.stringify(dataToSave));
            localStorage.setItem('heimaFrameWorkLastUpdate', new Date().toISOString());
            document.getElementById('lastUpdate').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN');
        }

        // Calculate overall progress
        function calculateOverallProgress() {
            let totalProgress = 0;
            projectData.modules.forEach(module => {
                const completedTasks = module.tasks.filter(t => t.done).length;
                const totalTasks = module.tasks.length;
                module.progress = Math.round((completedTasks / totalTasks) * 100);
                totalProgress += module.progress;
            });
            return Math.round(totalProgress / projectData.modules.length);
        }

        // Render the entire UI
        function render() {
            renderOverallProgress();
            renderModuleStatusTable();
            renderModuleSections();
            renderRoadmap();
            renderIssues();
            lucide.createIcons();
        }

        function renderOverallProgress() {
            const progress = calculateOverallProgress();
            document.getElementById('overallProgress').style.width = progress + '%';
            document.getElementById('overallPercent').textContent = progress + '%';
        }

                    <div class="flex items-center justify-between cursor-pointer" onclick="toggleModule('${module.id}')">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-gradient-to-br ${statusColor} rounded-lg flex items-center justify-center">
                                <i data-lucide="${module.expanded ? 'chevron-down' : 'chevron-right'}" class="w-5 h-5 text-white"></i>
                            </div>
                            <h3 class="text-lg font-bold text-gray-900 dark:text-white">${module.name}</h3>
                            <span class="text-sm text-gray-500 dark:text-gray-400">${completedTasks}/${totalTasks} 已完成</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-32 bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                                <div class="progress-bar h-full bg-gradient-to-r ${statusColor} rounded-full" style="width: ${module.progress}%"></div>
                            </div>
                            <span class="text-lg font-bold text-gray-900 dark:text-white">${module.progress}%</span>
                        </div>
                    </div>
                    <div class="section-content mt-4 ${module.expanded ? '' : 'hidden'}" id="content-${module.id}">
                        <div class="space-y-3 pl-4">
                            ${module.tasks.map(task => renderTask(task, module.id)).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function renderTask(task, moduleId) {
            const hasSubtasks = task.subtasks && task.subtasks.length > 0;
            const completedSubtasks = hasSubtasks ? task.subtasks.filter(st => st.done).length : 0;
            const totalSubtasks = hasSubtasks ? task.subtasks.length : 1;

            const isDone = task.done || (hasSubtasks && completedSubtasks === totalSubtasks);
            const progress = Math.round((completedSubtasks / totalSubtasks) * 100);

            let subtasksHtml = '';
            if (hasSubtasks) {
                subtasksHtml = `
                    <div class="mt-2 ml-6 space-y-2">
                        ${task.subtasks.map(st => `
                            <div class="task-item flex items-center gap-2">
                                <input type="checkbox" id="${st.id}" ${st.done ? 'checked' : ''} onchange="toggleSubtask('${moduleId}', '${task.id}', '${st.id}')" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                                <label for="${st.id}" class="text-sm text-gray-700 dark:text-gray-300 ${st.done ? 'line-through opacity-60' : ''}">${st.text}</label>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            return `
                <div class="task-item">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="${task.id}" ${isDone ? 'checked' : ''} onchange="toggleTask('${moduleId}', '${task.id}')" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        <label for="${task.id}" class="text-sm text-gray-700 dark:text-gray-300 font-medium ${isDone ? 'line-through opacity-60' : ''}">${task.text}</label>
                    </div>
                    ${subtasksHtml}
                </div>
            `;
        }

        function renderRoadmap() {
            const container = document.getElementById('roadmapContainer');
            container.innerHTML = '';

            projectData.roadmap.forEach((phase, index) => {
                const completedItems = phase.items.filter(i => i.done).length;
                const totalItems = phase.items.length;
                const progress = Math.round((completedItems / totalItems) * 100);

                const phaseDiv = document.createElement('div');
                phaseDiv.className = 'mb-6 bg-white/10 rounded-xl p-4';
                phaseDiv.innerHTML = `
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-2">
                            <span class="bg-white/20 px-3 py-1 rounded-full text-sm font-bold">阶段 ${phase.phase}</span>
                            <span class="font-bold">${phase.name}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-sm opacity-80">${completedItems}/${totalItems}</span>
                            <span class="font-bold">${progress}%</span>
                        </div>
                    </div>
                    <div class="w-full bg-white/20 rounded-full h-2 mb-3">
                        <div class="progress-bar h-full bg-white rounded-full" style="width: ${progress}%"></div>
                    </div>
                    <div class="space-y-2 pl-2">
                        ${phase.items.map(item => `
                            <div class="flex items-center gap-2">
                                <input type="checkbox" id="${item.id}" ${item.done ? 'checked' : ''} onchange="toggleRoadmapItem(${phase.phase}, '${item.id}')" class="w-4 h-4 rounded border-white/30 text-white focus:ring-white">
                                <label for="${item.id}" class="text-sm ${item.done ? 'line-through opacity-60' : ''}">${item.text}</label>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(phaseDiv);
            });
        }

        function renderIssues() {
            const container = document.getElementById('issuesContainer');
            container.innerHTML = '';

            const typeConfig = {
                'blocking': { icon: 'x-circle', color: 'text-red-500', bg: 'bg-red-50 dark:bg-red-900/20', label: '阻塞问题' },
                'pending': { icon: 'help-circle', color: 'text-yellow-500', bg: 'bg-yellow-50 dark:bg-yellow-900/20', label: '待验证' },
                'limitation': { icon: 'info', color: 'text-blue-500', bg: 'bg-blue-50 dark:bg-blue-900/20', label: '已知限制' }
            };

            Object.keys(typeConfig).forEach(type => {
                const issues = projectData.issues.filter(i => i.type === type);
                if (issues.length > 0) {
                    const config = typeConfig[type];
                    const typeSection = document.createElement('div');
                    typeSection.className = 'mb-4';
                    typeSection.innerHTML = `
                        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-3 flex items-center gap-2 ${config.color}">
                            <i data-lucide="${config.icon}"></i>
                            ${config.label} (${issues.length})
                        </h3>
                        <div class="space-y-2">
                            ${issues.map(issue => `
                                <div class="p-3 rounded-lg ${config.bg} border border-${config.color.split('-')[1]}-200">
                                    <div class="font-medium text-gray-900 dark:text-white mb-1">${issue.title}</div>
                                    <p class="text-sm text-gray-600 dark:text-gray-400 mb-1">${issue.desc}</p>
                                    <p class="text-sm text-gray-500 dark:text-gray-500"><strong>解决:</strong> ${issue.solution}</p>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    container.appendChild(typeSection);
                }
            });
        }

        // Event handlers
        function toggleModule(moduleId) {
            const module = projectData.modules.find(m => m.id === moduleId);
            module.expanded = !module.expanded;
            saveProgress();
            renderModuleSections();
        }

        function toggleTask(moduleId, taskId) {
            const module = projectData.modules.find(m => m.id === moduleId);
            const task = module.tasks.find(t => t.id === taskId);
            task.done = !task.done;
            saveProgress();
            render();
        }

        function toggleSubtask(moduleId, taskId, subtaskId) {
            const module = projectData.modules.find(m => m.id === moduleId);
            const task = module.tasks.find(t => t.id === taskId);
            const subtask = task.subtasks.find(st => st.id === subtaskId);
            subtask.done = !subtask.done;
            saveProgress();
            render();
        }

        function toggleRoadmapItem(phase, itemId) {
            const phaseObj = projectData.roadmap.find(p => p.phase === phase);
            const item = phaseObj.items.find(i => i.id === itemId);
            item.done = !item.done;
            saveProgress();
            render();
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }

        function exportProgress() {
            const data = JSON.stringify({
                progress: localStorage.getItem('heimaFrameWorkProgress'),
                lastUpdate: localStorage.getItem('heimaFrameWorkLastUpdate'),
                exportTime: new Date().toISOString()
            }, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `heimaFrameWork_progress_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('进度已导出！');
        }

        function importProgress(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    localStorage.setItem('heimaFrameWorkProgress', data.progress);
                    localStorage.setItem('heimaFrameWorkLastUpdate', data.lastUpdate);
                    loadProgress();
                    showToast('进度已导入！');
                } catch (err) {
                    showToast('导入失败：文件格式错误');
                }
            };
            reader.readAsText(file);
        }

        function resetAll() {
            document.getElementById('resetModal').classList.remove('hidden');
            document.getElementById('resetModal').classList.add('flex');
        }

        function closeResetModal() {
            document.getElementById('resetModal').classList.add('hidden');
            document.getElementById('resetModal').classList.remove('flex');
        }

        function confirmReset() {
            localStorage.removeItem('heimaFrameWorkProgress');
            localStorage.removeItem('heimaFrameWorkLastUpdate');
            location.reload();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadProgress();
        });
    </script>
</body>
</html>
